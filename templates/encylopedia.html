<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Livestock Encyclopedia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #3a5a40;
            /* Deep Forest Green */
            --secondary: #84c5e6;
            /* Sky Blue */
            --accent: #e9c46a;
            /* Golden Sand */
            --bg-light: #f4f9f4;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', sans-serif;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 2px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* Grid */
        .breed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Card */
        .breed-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 6px solid var(--accent);
        }

        .breed-card:hover {
            transform: translateY(-8px);
        }

        .breed-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #eee;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        .card-content h3 {
            color: var(--primary);
            font-size: 1.4rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--white);
            margin: 2% auto;
            width: 90%;
            max-width: 850px;
            border-radius: 25px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.4s ease-out;
            padding: 40px;
        }

        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            right: 25px;
            top: 15px;
            font-size: 35px;
            cursor: pointer;
            color: var(--primary);
        }

        .modal-header-info {
            border-bottom: 4px solid var(--secondary);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .modal-header-info h2 {
            color: var(--primary);
            font-size: 2.2rem;
        }

        .desc-text {
            color: #444;
            font-size: 1.05rem;
            margin-bottom: 25px;
            text-align: justify;
            line-height: 1.8;
        }

        .info-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .advice-card {
            background: var(--secondary);
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .diet-card {
            background: var(--accent);
            color: #443a20;
            padding: 20px;
            border-radius: 15px;
        }

        .navbar {
            height: 60px;
            background: #3A5A40;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            margin-top: 5px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hamburger {
            font-size: 26px;
            cursor: pointer;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .hamburger:hover {
            transform: scale(1.1);
            color: #E9C46A;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .side-menu {
            position: fixed;
            top: 4rem;
            left: -270px;
            width: 250px;
            height: 80vh;
            background: white;
            padding-top: 30px;
            transition: 0.3s ease;
            z-index: 1000;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            border-right: 6px solid #E9C46A;
        }

        .side-menu ul {
            list-style: none;
        }

        .side-menu li {
            margin: 10px 0;
        }

        .side-menu a {
            color: #2F3E46;
            text-decoration: none;
            padding: 12px 24px;
            display: block;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .side-menu a:hover {
            background: #E9C46A;
            color: #003049;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            transform: translateX(4px);
            color: #fff;
        }

    </style>
</head>

<body>

    
    <header class="navbar">
        <div class="nav-left">
            <div class="hamburger" id="hamburger">&#9776;</div>
            <div class="hamburger" id="close" style="display: none;"><i class="fa-solid fa-x"></i></div>
            <div class="logo">MyCattle</div>
        </div>
    </header>

    <nav class="side-menu" id="sideMenu">
        <ul>
            <li><a href="/recognition">Cattle Recognition</a></li>
            <li><a href="/records">Cattle Records</a></li>
            <li><a href="/encylopedia">Cattle Encyclopedia</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1><i class="fas fa-book-open"></i> Indian Livestock Encyclopedia</h1>
            <p>Comprehensive Profiles of Native Breeds & Expert Farming Advice</p>
        </header>

        <div class="filter-tabs">
            <button class="filter-btn active" onclick="filterCategory('cow', this)">
                Cow</button>
            <button class="filter-btn" onclick="filterCategory('buffalo', this)">
                Buffalo</button>
            <button class="filter-btn" onclick="filterCategory('sheep', this)">
                Sheep</button>
            <button class="filter-btn" onclick="filterCategory('goat', this)"> Goat</button>
        </div>

        <div class="breed-grid" id="breedGrid"></div>
    </div>

    <div id="breedModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>

                    advice: "Due to their size, Kankrej cows require spacious housing. Handle them with firm but gentle care, as they are powerful. Their horns should be checked for cracks or fungal growth periodically.",

        function filterCategory(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const grid = document.getElementById('breedGrid');
            grid.innerHTML = '';

            livestockData[category].forEach(breed => {
                const card = document.createElement('div');
                card.className = 'breed-card';
                card.innerHTML = `
                <img src="static/${breed.name}.jpg" alt="${breed.name}">
                <div class="card-content">
                    <h3>${breed.name}</h3>
                </div>
            `;
                card.onclick = () => openModal(breed);
                grid.appendChild(card);
            });
        }

        function openModal(breed) {
            const modal = document.getElementById('breedModal');
            const body = document.getElementById('modalBody');
            body.innerHTML = `
            <div class="modal-header-info">
                <h2><i class="fas fa-info-circle"></i> ${breed.name} Encyclopedia</h2>
            </div>
            <p class="desc-text">${breed.desc}</p>
            <div class="info-title"><i class="fas fa-user-tie"></i> Farmer's Expert Advice</div>
            <div class="advice-card">${breed.advice}</div>
            <div class="info-title"><i class="fas fa-utensils"></i> Recommended Diet Plan</div>
            <div class="diet-card">${breed.diet}</div>
        `;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('breedModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); };

        window.onload = () => filterCategory('cow', document.querySelector('.filter-btn'));
        
        
        document.getElementById("hamburger").addEventListener("click", function (event) {
            document.getElementById("hamburger").style.display = "none";
            document.getElementById("close").style.display = "block";
            document.getElementById("sideMenu").style.left = "5px";
        });
        document.getElementById("close").addEventListener("click", function (event) {
            document.getElementById("close").style.display = "none";
            document.getElementById("hamburger").style.display = "block";
            document.getElementById("sideMenu").style.left = "-270px";
        });
    </script>
</body>
